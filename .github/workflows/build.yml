name: Build APK

# Runs on every push/PR to main, and can also be triggered manually from the
# Actions tab (workflow_dispatch).
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Assemble debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Installs the exact Gradle version this project needs and runs builds
      # with it directly. This avoids relying on gradlew (which isn't
      # committed) or on whatever "gradle" binary happens to be preinstalled
      # on the runner image to bootstrap the wrapper — that preinstalled
      # version drifts over time (e.g. GitHub's runner shipped Gradle 9.6.1,
      # which is incompatible with AGP 8.x: see
      # https://github.com/gradle/gradle/issues/38073). Pinning here keeps
      # the build version-stable regardless of runner image changes.
      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
          cache-read-only: false

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: backdrop-demo-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
