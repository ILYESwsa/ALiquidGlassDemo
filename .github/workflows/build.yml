name: Build APK

# Runs on every push/PR to main, and can also be triggered manually from the
# Actions tab (workflow_dispatch).
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Assemble debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Generates gradle-wrapper.jar + gradlew/gradlew.bat if they aren't
      # already committed, using the version pinned in
      # gradle/wrapper/gradle-wrapper.properties.
      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.7
        if: hashFiles('gradlew') == ''

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: backdrop-demo-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
